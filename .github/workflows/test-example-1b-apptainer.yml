name: Test Example 1b (Apptainer)

# Runs the 1b statewide woody crops example end-to-end using the workflow
# Apptainer container for all R steps, with Slurm dispatch for ensemble members.
# Requires a self-hosted runner with Slurm and apptainer on PATH (or via module).

on:
  workflow_dispatch:
    inputs:
      pecan_env_version:
        description: 'pecan-all conda env version (e.g. 1.10)'
        default: '1.10'
        required: false
  push:
    branches: [main]
    paths:
      - 'examples/1b_statewide_woody/**'
      - 'workflow/**'
      - 'magic-ensemble'
      - '.github/workflows/test-example-1b-apptainer.yml'

env:
  PECAN_ENV_VERSION: ${{ github.event.inputs.pecan_env_version || '1.10' }}
  CONFIG: ci-1b-apptainer-config.yaml
  RUN_DIR: ci-1b-apptainer-rundir

jobs:
  run:
    name: 1b Statewide Woody (apptainer, Slurm)
    runs-on: self-hosted
    timeout-minutes: 480
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_GARAGE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_GARAGE_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Load apptainer module
        run: module load apptainer

      - name: Setup conda environment
        run: |
          aws s3 cp s3://carb/deploy/setup-pecan-env.sh setup-pecan-env.sh \
            --endpoint-url https://s3.garage.ccmmf.ncsa.cloud
          bash setup-pecan-env.sh "${PECAN_ENV_VERSION}" ./conda-env

      - name: Write CI config
        run: |
          cat > "$CONFIG" << 'EOF'
          run_dir: "ci-1b-apptainer-rundir/"
          start_date: "2016-01-01"
          end_date: "2017-12-31"
          run_LAI_date: "2016-07-01"
          n_ens: 5
          n_met: 3
          ic_ensemble_size: 20
          n_workers: 2
          use_apptainer: true
          pecan_dispatch: slurm-dispatch
          external_paths:
            template_file: "examples/1b_statewide_woody/template.xml"
            site_info_file: "examples/1b_statewide_woody/site_info.csv"
          EOF

      - name: Prepare
        run: |
          source conda-env/bin/activate
          ./magic-ensemble prepare-example-1b --verbose --config "$CONFIG"

      - name: Run ensembles
        run: |
          source conda-env/bin/activate
          ./magic-ensemble run-ensembles --verbose --config "$CONFIG"

      - name: Cleanup
        if: always()
        run: rm -rf "$RUN_DIR" "$CONFIG" conda-env
