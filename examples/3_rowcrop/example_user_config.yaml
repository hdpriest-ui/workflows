# Example user config for the 3 rowcrop management events workflow.
# Run with:
#   ./magic-ensemble prepare-example-3 --config examples/3_rowcrop/example_user_config.yaml
#   ./magic-ensemble run-ensembles      --config examples/3_rowcrop/example_user_config.yaml

run_dir: "3-rowcrop-example-rundir/"

start_date: "2016-01-01"
end_date: "2023-12-31"
run_LAI_date: "2016-07-01"

n_ens: 20
n_met: 10
ic_ensemble_size: 100
n_workers: 1
use_apptainer: false
pecan_dispatch: local-gnu-parallel

# Stage example-specific input files into run_dir before prepare runs.
# site_info.csv is provided by the demo data download (artifact_02).
external_paths:
  template_file: "examples/3_rowcrop/template.xml"
