name: Test Example 3 (Conda)

# Runs the 3 rowcrop management events example end-to-end using a conda-pack
# environment fetched from S3 for R (no Apptainer), with Slurm dispatch.
# Requires a self-hosted runner with Slurm and the aws CLI.

on:
  workflow_dispatch:
    inputs:
      pecan_env_version:
        description: 'pecan-all conda-pack version (e.g. 1.10)'
        default: '1.10'
        required: false
  push:
    branches: [main]
    paths:
      - 'examples/3_rowcrop/**'
      - 'workflow/**'
      - 'tools/**'
      - 'magic-ensemble'
      - '.github/workflows/test-example-3-conda.yml'
      - '.github/ci/example_3_conda_config.yaml'

env:
  PECAN_ENV_VERSION: ${{ github.event.inputs.pecan_env_version || '1.10' }}
  CONFIG: .github/ci/example_3_conda_config.yaml

jobs:
  run:
    name: 3 Rowcrop (conda, Slurm)
    runs-on: self-hosted
    timeout-minutes: 480
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_GARAGE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_GARAGE_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup conda environment
        run: |
          aws s3 cp s3://carb/deploy/setup-pecan-env.sh setup-pecan-env.sh \
            --endpoint-url https://s3.garage.ccmmf.ncsa.cloud
          bash setup-pecan-env.sh "${PECAN_ENV_VERSION}" ./conda-env
          echo "RETICULATE_PYTHON=${GITHUB_WORKSPACE}/conda-env/bin/python" >> "$GITHUB_ENV"

      - name: Prepare
        run: |
          set +u
          eval "$(conda shell.bash hook)"
          conda activate ./conda-env
          set -u
          ./magic-ensemble prepare-example-3 --verbose --config "$CONFIG"

      - name: Run ensembles
        run: |
          set +u
          eval "$(conda shell.bash hook)"
          conda activate ./conda-env
          set -u
          ./magic-ensemble run-ensembles --verbose --config "$CONFIG"

      - name: Cleanup
        if: always()
        run: rm -rf ci-3-conda-rundir conda-env setup-pecan-env.sh
